<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menú — Haz tu pedido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="header">
    <div class="header__logo">
      <img src="logo-esquina-dulce.png" class="header__logo-img" />
    </div>
    <div class="header__meta">
      <span class="header__table">Mesa <strong id="mesa-numero">—</strong></span>
    </div>
    <button class="header__cart-btn" id="cart-toggle" aria-label="Ver carrito">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span class="cart-badge" id="cart-badge">0</span>
    </button>
    <button class="ver-pantalla" onclick="irPantalla()">
      Ver lista de pedidos en vivo 📺
    </button>
  </header>

  <!-- ── HERO ── -->
  <section class="hero">
    <p class="hero__eyebrow">Bienvenido</p>
    <h1 class="hero__title">¿Qué se te<br/>antoja hoy?</h1>
  </section>

  <!-- ── CATEGORÍAS ── -->
  <nav class="categories" id="categorias" aria-label="Categorías del menú">
    <!-- generadas por JS -->
  </nav>

  <!-- ── GRID DE PRODUCTOS ── -->
  <main class="menu" id="menu-grid" aria-live="polite">
    <!-- generadas por JS -->
  </main>

  <!-- ── PANEL DEL CARRITO ── -->
  <aside class="cart-panel" id="cart-panel" aria-hidden="true">
    <div class="cart-panel__overlay" id="cart-overlay"></div>
    <div class="cart-panel__drawer">
      <div class="cart-panel__header">
        <h2 class="cart-panel__title">Tu pedido</h2>
        <button class="cart-panel__close" id="cart-close" aria-label="Cerrar carrito">✕</button>
      </div>
      <ul class="cart-list" id="cart-list">
        <!-- ítems generados por JS -->
      </ul>
      <div class="cart-panel__empty" id="cart-empty">
        <span>Tu pedido está vacío</span>
      </div>
      <div class="cart-panel__footer">
        <div class="cart-total">
          <span>Total</span>
          <span id="cart-total">RD$0</span>
        </div>
        <div class="cart-notes">
          <label for="nota-pedido">Nota para la cocina (opcional)</label>
          <textarea id="nota-pedido" placeholder="Ej: sin cebolla, extra picante…" rows="2"></textarea>
        </div>
        <div class="cart-notes">
          <label for="nombre-cliente">Tu nombre (opcional)</label>
          <input 
            type="text" 
            id="nombre-cliente" 
            placeholder="Ej: Juan Pérez"
          />
        </div>
        <button class="btn-confirmar" id="btn-confirmar" disabled>
          Confirmar pedido
        </button>
      </div>
    </div>
  </aside>

  <!-- ── MODAL DE CONFIRMACIÓN ── -->
  <div class="modal-confirm" id="modal-confirm" aria-hidden="true">
    <div class="modal-confirm__box">
      <div class="modal-confirm__icon">✓</div>
      <h2 class="modal-confirm__title">¡Pedido enviado!</h2>
      <p class="modal-confirm__sub">
        💖 Estamos preparando tu pedido con amor<br/>
        Puedes ver tu número en pantalla
      </p>
      <p class="modal-confirm__num" id="confirm-num"></p>
      <button class="modal-confirm__btn" id="modal-close">Hacer otro pedido</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="data.js"></script>
  <script src="app.js"></script>

  <script>
    function irPantalla() {
  window.location.href = "pantalla.html"
}
  </script>
</body>
</html>
