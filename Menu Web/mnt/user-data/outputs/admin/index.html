<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Productos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ══ LOGIN ══ -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <p class="login-eyebrow">Admin</p>
      <h1 class="login-title">◈ La Mesa</h1>
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="admin@lamesa.com" />
      </div>
      <div class="field">
        <label for="login-pass">Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••" />
      </div>
      <p class="login-error" id="login-error"></p>
      <button class="btn-primary" id="btn-login">Entrar</button>
    </div>
  </div>

  <!-- ══ PANEL ADMIN ══ -->
  <div class="admin" id="admin-panel" hidden>

    <header class="admin-header">
      <div class="admin-header__left">
        <span class="admin-header__mark">◈</span>
        <span class="admin-header__title">Gestión de productos</span>
      </div>
      <div class="admin-header__right">
        <button class="btn-primary btn--sm" id="btn-nuevo">+ Nuevo producto</button>
        <button class="btn-logout" id="btn-logout" title="Cerrar sesión">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Filtros -->
    <div class="admin-toolbar">
      <div class="cat-tabs" id="cat-tabs">
        <button class="cat-tab active" data-cat="todas">Todas</button>
      </div>
      <label class="toggle-wrap">
        <input type="checkbox" id="solo-no-disponibles" />
        <span class="toggle-label">Solo no disponibles</span>
      </label>
    </div>

    <!-- Tabla de productos -->
    <div class="table-wrap">
      <table class="prod-table" id="prod-table">
        <thead>
          <tr>
            <th class="col-img">Imagen</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th class="col-precio">Precio</th>
            <th class="col-toggle">Disponible</th>
            <th class="col-toggle">Destacado</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="prod-tbody"></tbody>
      </table>
    </div>

    <div class="empty" id="empty-state" hidden>
      <p class="empty__text">Sin productos en esta categoría.</p>
    </div>

  </div>

  <!-- ══ MODAL: CREAR / EDITAR PRODUCTO ══ -->
  <div class="modal" id="producto-modal" hidden aria-hidden="true">
    <div class="modal__overlay" id="modal-overlay"></div>
    <div class="modal__box">

      <div class="modal__header">
        <h2 class="modal__title" id="modal-title">Nuevo producto</h2>
        <button class="modal__close" id="modal-close">✕</button>
      </div>

      <div class="modal__body">

        <!-- Imagen -->
        <div class="img-upload" id="img-upload-area">
          <div class="img-preview" id="img-preview">
            <span class="img-preview__placeholder">Sin imagen</span>
          </div>
          <div class="img-upload__controls">
            <label class="btn-secondary btn--sm" for="img-file">
              Subir imagen
              <input type="file" id="img-file" accept="image/*" hidden />
            </label>
            <button class="btn-ghost btn--sm" id="btn-quitar-img">Quitar</button>
            <span class="img-hint">JPG/PNG · máx. 2 MB</span>
          </div>
        </div>

        <!-- Campos -->
        <div class="form-grid">
          <div class="field field--full">
            <label for="f-nombre">Nombre <span class="req">*</span></label>
            <input type="text" id="f-nombre" placeholder="Ej: Mofongo de camarones" />
          </div>

          <div class="field field--full">
            <label for="f-desc">Descripción</label>
            <textarea id="f-desc" rows="2" placeholder="Breve descripción del plato…"></textarea>
          </div>

          <div class="field">
            <label for="f-categoria">Categoría <span class="req">*</span></label>
            <select id="f-categoria">
              <option value="">— Selecciona —</option>
            </select>
          </div>

          <div class="field">
            <label for="f-precio">Precio (RD$) <span class="req">*</span></label>
            <input type="number" id="f-precio" min="0" step="1" placeholder="350" />
          </div>

          <div class="field field--check">
            <label class="check-label">
              <input type="checkbox" id="f-disponible" checked />
              Disponible
            </label>
          </div>

          <div class="field field--check">
            <label class="check-label">
              <input type="checkbox" id="f-destacado" />
              Destacado
            </label>
          </div>
        </div>

      </div>

      <div class="modal__footer">
        <p class="form-error" id="form-error"></p>
        <div class="modal__footer-btns">
          <button class="btn-ghost" id="btn-cancelar">Cancelar</button>
          <button class="btn-primary" id="btn-guardar">Guardar</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ══ MODAL: CONFIRMAR ELIMINACIÓN ══ -->
  <div class="modal" id="confirm-modal" hidden aria-hidden="true">
    <div class="modal__overlay" id="confirm-overlay"></div>
    <div class="modal__box modal__box--sm">
      <div class="modal__header">
        <h2 class="modal__title">Eliminar producto</h2>
        <button class="modal__close" id="confirm-close">✕</button>
      </div>
      <div class="modal__body">
        <p class="confirm-text">¿Seguro que quieres eliminar <strong id="confirm-nombre"></strong>? Esta acción no se puede deshacer.</p>
      </div>
      <div class="modal__footer">
        <div class="modal__footer-btns">
          <button class="btn-ghost" id="btn-no">Cancelar</button>
          <button class="btn-danger" id="btn-si">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
