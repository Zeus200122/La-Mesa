<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de cocina — La Mesa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ══ PANTALLA DE LOGIN ══ -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <span class="login-logo__mark">◈</span>
        <span class="login-logo__name">La Mesa</span>
        <span class="login-logo__sub">Panel de cocina</span>
      </div>
      <div class="login-fields">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="empleado@lamesa.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="login-pass">Contraseña</label>
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <p class="login-error" id="login-error"></p>
        <button class="btn-login" id="btn-login">Entrar</button>
      </div>
    </div>
  </div>

  <!-- ══ PANEL PRINCIPAL ══ -->
  <div class="panel" id="panel" hidden>

    <!-- Header -->
    <header class="panel-header">
      <div class="panel-header__left">
        <span class="panel-header__mark">◈</span>
        <span class="panel-header__title">Cocina</span>
        <span class="panel-indicator" id="realtime-indicator" title="Tiempo real activo"></span>
      </div>
      <div class="panel-header__center">
        <!-- Filtros de estado -->
        <nav class="filter-tabs" id="filter-tabs">
          <button class="filter-tab active" data-estado="todos">Todos</button>
          <button class="filter-tab" data-estado="pendiente">Pendientes</button>
          <button class="filter-tab" data-estado="en preparacion">En prep.</button>
          <button class="filter-tab" data-estado="listo">Listos</button>
        </nav>
      </div>
      <div class="panel-header__right">
        <div class="panel-stats">
          <span class="stat" id="stat-pendientes">
            <span class="stat__num" id="num-pendientes">0</span>
            <span class="stat__label">pendientes</span>
          </span>
          <span class="stat" id="stat-prep">
            <span class="stat__num" id="num-prep">0</span>
            <span class="stat__label">en prep.</span>
          </span>
        </div>
        <button class="btn-logout" id="btn-logout" title="Cerrar sesión">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Filtro de mesa -->
    <div class="mesa-filter" id="mesa-filter">
      <span class="mesa-filter__label">Mesa</span>
      <div class="mesa-chips" id="mesa-chips">
        <button class="mesa-chip active" data-mesa="todas">Todas</button>
      </div>
    </div>

    <!-- Grid de pedidos -->
    <main class="orders-grid" id="orders-grid" aria-live="polite">
      <!-- tarjetas generadas por JS -->
    </main>

    <!-- Estado vacío -->
    <div class="empty-state" id="empty-state" hidden>
      <p class="empty-state__icon">▣</p>
      <p class="empty-state__text">Sin pedidos activos</p>
    </div>

  </div>

  <!-- ══ MODAL DE DETALLE ══ -->
  <div class="detail-modal" id="detail-modal" aria-hidden="true" hidden>
    <div class="detail-modal__overlay" id="detail-overlay"></div>
    <div class="detail-modal__box">
      <div class="detail-modal__header">
        <div>
          <p class="detail-modal__num" id="detail-num"></p>
          <p class="detail-modal__meta" id="detail-meta"></p>
        </div>
        <button class="detail-modal__close" id="detail-close">✕</button>
      </div>
      <ul class="detail-items" id="detail-items"></ul>
      <div class="detail-nota" id="detail-nota-wrap">
        <p class="detail-nota__label">Nota</p>
        <p class="detail-nota__text" id="detail-nota"></p>
      </div>
      <div class="detail-modal__footer">
        <p class="detail-total">Total: <strong id="detail-total"></strong></p>
        <div class="detail-actions" id="detail-actions"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
